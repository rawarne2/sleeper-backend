openapi: 3.1.0
info:
  title: Sleeper Backend API
  description: |
    A comprehensive fantasy football API that aggregates data from **KeepTradeCut (KTC)** and **Sleeper API**.

    This API provides comprehensive fantasy football data by combining:
    - 🏈 **KeepTradeCut (KTC)**: Player rankings and trade values (Dynasty & Redraft rankings, 1QB & Superflex league formats, TEP scoring variations)
    - 🏈 **Sleeper API**: Player data & league management (Comprehensive player profiles, League management, Research data and projections)

    ## Performance Optimizations
    - **Database Caching Strategy**: First API call fetches from external APIs and caches in database, subsequent calls served instantly from local cache
    - **Response Time Guidelines**: First refresh call takes 30-60 seconds, cached data retrieval < 1 second, health checks < 100ms
    - **Gunicorn Multi-Worker Setup**: 9 worker processes for concurrent request handling with load balancing
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/rawarne2/sleeper-backend

servers:
  - url: http://localhost:5001
    description: Development server
  - url: https://sleeper-backend.vercel.app
    description: Production server

tags:
  - name: Health
    description: System health and status endpoints
  - name: KTC Player Rankings
    description: KeepTradeCut player rankings and values
  - name: Sleeper Players
    description: Sleeper player data management
  - name: Sleeper Leagues
    description: Sleeper league management endpoints
  - name: Sleeper Research
    description: Sleeper player research and analytics data
  - name: Bulk Operations
    description: Bulk refresh operations for scheduled tasks
  - name: Sleeper Weekly Stats
    description: Sleeper weekly fantasy football stats and roster information
  - name: Dashboard
    description: Aggregated dashboard payload endpoints
  - name: Maintenance
    description: Operator-only maintenance and cron endpoints
  - name: Trade Analyzer
    description: AI-powered trade analysis endpoints

paths:
  /api/ktc/health:
    get:
      tags:
        - Health
      summary: Database health check
      description: Check API and database health status
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: "healthy"
                database: "connected"
                timestamp: "2025-01-05T17:58:12.123456+00:00"
        "500":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ktc/refresh:
    post:
      tags:
        - KTC Player Rankings
      summary: Refresh KTC player rankings
      description: |
        Fetch fresh KTC rankings and store in database. Returns all player data including dynasty/redraft values, rankings, trends, and tiers.

        **Performance Note**: This operation takes 30-60 seconds as it fetches from external APIs.
      operationId: refreshKTCRankings
      parameters:
        - $ref: "#/components/parameters/IsRedraft"
        - $ref: "#/components/parameters/LeagueFormat"
        - $ref: "#/components/parameters/TepLevel"
      responses:
        "200":
          description: Rankings refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KTCRefreshResponse"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error during refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ktc/refresh/status/{job_id}:
    get:
      tags:
        - KTC Player Rankings
      summary: Get KTC refresh job status
      description: Poll status for an async KTC refresh job started by POST/PUT /api/ktc/refresh.
      operationId: getKtcRefreshJobStatus
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job status retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  status:
                    type: string
                    enum: ["queued", "running", "success", "error"]
                  created_at:
                    type: string
                    nullable: true
                  finished_at:
                    type: string
                    nullable: true
                  league_format:
                    type: string
                    nullable: true
                  is_redraft:
                    type: boolean
                    nullable: true
                  tep_level:
                    type: string
                    nullable: true
                  error:
                    type: string
                    nullable: true
                  summary:
                    type: object
                    nullable: true
        "404":
          description: Unknown job id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - KTC Player Rankings
      summary: Update KTC player rankings
      description: |
        Fetch fresh KTC rankings and update the stored database records. Returns all player data including dynasty/redraft values, rankings, trends, and tiers.

        **Performance Note**: This operation takes 30-60 seconds as it fetches from external APIs.
      operationId: updateKTCRankings
      parameters:
        - $ref: "#/components/parameters/IsRedraft"
        - $ref: "#/components/parameters/LeagueFormat"
        - $ref: "#/components/parameters/TepLevel"
      responses:
        "200":
          description: Rankings updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KTCRefreshResponse"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error during refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ktc/rankings:
    get:
      tags:
        - KTC Player Rankings
      summary: Get stored player rankings
      description: |
        Retrieve stored player rankings with filtering options. Returns comprehensive player data including KTC rankings, Sleeper data, physical attributes, career info, and injury status.

        **Performance Note**: Served from database cache, typically < 1 second response time.
      operationId: getKTCRankings
      parameters:
        - $ref: "#/components/parameters/IsRedraft"
        - $ref: "#/components/parameters/LeagueFormat"
        - $ref: "#/components/parameters/TepLevel"
      responses:
        "200":
          description: Rankings retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KTCRankingsResponse"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No rankings found for specified parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error during retrieval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ktc/cleanup:
    post:
      tags:
        - KTC Player Rankings
      summary: Clean up incomplete data
      description: Endpoint to clean up incomplete or corrupted data from the database
      operationId: cleanupKTCData
      parameters:
        - $ref: "#/components/parameters/IsRedraft"
        - $ref: "#/components/parameters/LeagueFormat"
        - $ref: "#/components/parameters/TepLevel"
      responses:
        "200":
          description: Cleanup completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupResponse"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error during cleanup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ktc/refresh/all:
    post:
      tags:
        - Bulk Operations
      summary: Comprehensive KTC refresh
      description: |
        All KTC refresh - scrapes and saves ALL KTC data. Gets dynasty + redraft data with all league formats (1QB + Superflex) and all TEP levels (base, TEP, TEPP, TEPPP) in a single operation.

        **Ideal for cron jobs** since it ensures complete data coverage without needing multiple calls with different parameters.

        **Performance Note**: This is a comprehensive operation that may take several minutes to complete.
      operationId: refreshAllKTCData
      responses:
        "200":
          description: Comprehensive refresh completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComprehensiveRefreshResponse"
        "500":
          description: Server error during comprehensive refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sleeper/refresh:
    post:
      tags:
        - Sleeper Players
      summary: Refresh Sleeper player data
      description: |
        Refresh Sleeper player data and merge with existing KTC data. Returns comprehensive player data including physical attributes, career info, fantasy data, injury status, and metadata.
      operationId: refreshSleeperData
      responses:
        "200":
          description: Sleeper data refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleeperRefreshResponse"
        "500":
          description: Server error during Sleeper refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sleeper/league/{league_id}:
    get:
      tags:
        - Sleeper Leagues
      summary: Get comprehensive league data
      description: |
        Get comprehensive league data (league info, rosters, users). Returns complete league configuration, all rosters with player IDs, and user information. Checks database first, falls back to Sleeper API.
      operationId: getLeagueData
      parameters:
        - $ref: "#/components/parameters/LeagueId"
      responses:
        "200":
          description: League data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueDataResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Sleeper Leagues
      summary: Refresh league data
      description: Refresh all league data from Sleeper API (league info, rosters, users)
      operationId: refreshLeagueData
      parameters:
        - $ref: "#/components/parameters/LeagueId"
      responses:
        "200":
          description: League data refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueRefreshResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Sleeper Leagues
      summary: Update league data
      description: Refresh all league data from Sleeper API (league info, rosters, users)
      operationId: updateLeagueData
      parameters:
        - $ref: "#/components/parameters/LeagueId"
      responses:
        "200":
          description: League data refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueRefreshResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sleeper/league/{league_id}/rosters:
    get:
      tags:
        - Sleeper Leagues
      summary: Get league rosters
      description: Get league rosters data for all teams in the league
      operationId: getLeagueRosters
      parameters:
        - $ref: "#/components/parameters/LeagueId"
      responses:
        "200":
          description: Rosters retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RostersResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sleeper/league/{league_id}/users:
    get:
      tags:
        - Sleeper Leagues
      summary: Get league users
      description: Get league users data for all participants in the league
      operationId: getLeagueUsers
      parameters:
        - $ref: "#/components/parameters/LeagueId"
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sleeper/league/{league_id}/stats/week/{week}:
    get:
      tags:
        - Sleeper Weekly Stats
      summary: Get weekly stats for a specific week
      description: |
        Get weekly fantasy points and roster information for all players in a specific week.
        Returns player scoring data including points, roster ID, and is_starter status.
      parameters:
        - $ref: "#/components/parameters/LeagueId"
        - $ref: "#/components/parameters/WeekPath"
        - $ref: "#/components/parameters/SeasonQuery"
        - $ref: "#/components/parameters/LeagueType"
        - name: average
          in: query
          description: Whether to return season averages (weeks 1-17; week 18 excluded)
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Weekly stats retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyStatsResponse"
        "404":
          description: Weekly stats not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Sleeper Weekly Stats
      summary: Refresh weekly stats for a specific week
      description: |
        Fetch fresh weekly stats data from Sleeper API for a specific week and save to database.
        This endpoint fetches matchup data and extracts player scoring information.
      parameters:
        - $ref: "#/components/parameters/LeagueId"
        - $ref: "#/components/parameters/WeekPath"
        - $ref: "#/components/parameters/SeasonQuery"
        - $ref: "#/components/parameters/LeagueType"
      responses:
        "200":
          description: Weekly stats refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyStatsRefreshResponse"
        "400":
          description: Invalid parameters or failed to refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Sleeper Weekly Stats
      summary: Update weekly stats for a specific week
      description: |
        Fetch fresh weekly stats data from Sleeper API for a specific week and save to database.
        This endpoint fetches matchup data and extracts player scoring information.
      parameters:
        - $ref: "#/components/parameters/LeagueId"
        - $ref: "#/components/parameters/WeekPath"
        - $ref: "#/components/parameters/SeasonQuery"
        - $ref: "#/components/parameters/LeagueType"
      responses:
        "200":
          description: Weekly stats refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyStatsRefreshResponse"
        "400":
          description: Invalid parameters or failed to refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sleeper/league/{league_id}/stats/seed:
    post:
      tags:
        - Sleeper Weekly Stats
      summary: Seed league stats information
      description: |
        Create or update league information needed for weekly stats tracking.
        This should be called before fetching weekly stats to ensure proper league setup.
      parameters:
        - $ref: "#/components/parameters/LeagueId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                league_name:
                  type: string
                  description: The league name
                  default: "Fantasy League"
                season:
                  type: string
                  description: The NFL season year
                  pattern: "^[0-9]{4}$"
                  example: "2024"
                league_type:
                  type: string
                  description: League type
                  enum: ["dynasty", "redraft"]
                  default: "dynasty"
                scoring_settings:
                  type: object
                  description: League scoring settings
              required:
                - league_name
                - season
      responses:
        "200":
          description: League stats seeded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueStatsSeedResponse"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sleeper/players/research/{season}:
    get:
      tags:
        - Sleeper Research
      summary: Get player research data
      description: |
        Get player research data for a specific season. Returns comprehensive research metrics including rankings, projections, performance data, and statistical analysis. Checks database first.
      operationId: getResearchData
      parameters:
        - $ref: "#/components/parameters/Season"
        - $ref: "#/components/parameters/WeekQuery"
        - $ref: "#/components/parameters/LeagueType"
      responses:
        "200":
          description: Research data retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchDataResponse"
        "404":
          description: Research data not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/players/all:
    get:
      tags:
        - Dashboard
      summary: Full player universe in the unified dashboard shape
      description: |
        Returns every player that has a KTC values row for the requested format,
        serialized with the same shape as the dashboard bundle players array.

        When `league_id` is supplied the response computes season points using that
        league's actual `scoring_settings` (dot-product `Σ scoring_settings[k] × stats[k]`
        over the `nfl_player_week_stats` table, weeks 1–18). The optional `tep` override
        replaces `bonus_rec_te` in the scoring so the TE-premium dropdown can preview
        point changes for all players without re-selecting a different league.

        Without `league_id` the endpoint falls back to a half-PPR baseline so `stats`
        fields still populate.

        Players without a KTC row for the format are excluded.

        The response header `X-Players-All-Cache` is `HIT` when served from Redis cache
        and `MISS` on a fresh computation. The Redis cache key includes `league_id` so
        switching leagues never serves stale values from a different league (cache prefix v2).
      operationId: getAllPlayers
      parameters:
        - $ref: "#/components/parameters/LeagueFormat"
        - $ref: "#/components/parameters/IsRedraft"
        - $ref: "#/components/parameters/TepLevel"
        - $ref: "#/components/parameters/SeasonQuery"
        - name: league_id
          in: query
          description: |
            Sleeper league ID. When provided the scoring engine loads this league's
            `scoring_settings` to compute per-player season points for the whole
            player universe. Ignored for KTC/FantasyCalc values (those are format-keyed).
          required: false
          schema:
            type: string
            pattern: "^[0-9]+$"
          example: "1210364682523656192"
      responses:
        "200":
          description: Player universe retrieved successfully
          headers:
            X-Players-All-Cache:
              description: "`HIT` when served from Redis; `MISS` on fresh computation."
              schema:
                type: string
                enum: [HIT, MISS]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayersAllResponse"
              example:
                status: success
                timestamp: "2026-06-16T10:00:00Z"
                league_format: superflex
                is_redraft: false
                tep_level: tep
                league_id: "1210364682523656192"
                count: 412
                researchMeta:
                  season: "2025"
                  week: 17
                  league_type: dynasty
                players:
                  - sleeper_player_id: "7553"
                    playerName: Kyle Pitts
                    position: TE
                    team: ATL
                    stats:
                      total_points: 154.3
                      average_points: 9.64
                      games_played: 16
                    research_latest:
                      week: 17
                      market_owned_pct: 0.92
                      market_started_pct: 0.71
                    values:
                      blended: 5820
                      sources:
                        ktc:
                          value: 5640
                        fantasycalc:
                          value: 6000
                          trend_30day: 120
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/dashboard/league/{league_id}:
    get:
      tags:
        - Dashboard
      summary: Get dashboard league bundle
      description: |
        Returns a merged dashboard payload for a league, including rosters, player projections/values,
        research metadata, and optional per-player season stats.
      operationId: getDashboardLeagueBundle
      parameters:
        - $ref: "#/components/parameters/LeagueId"
        - $ref: "#/components/parameters/SeasonQuery"
        - $ref: "#/components/parameters/IsRedraft"
        - $ref: "#/components/parameters/LeagueFormat"
        - $ref: "#/components/parameters/TepLevel"
      responses:
        "200":
          description: Dashboard payload retrieved successfully
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/maintenance/health:
    get:
      tags:
        - Maintenance
      summary: Maintenance route health
      description: Lightweight endpoint that documents available maintenance routes and auth expectations.
      operationId: getMaintenanceHealth
      responses:
        "200":
          description: Maintenance route metadata
          content:
            application/json:
              schema:
                type: object

  /api/maintenance/nightly-sync:
    get:
      tags:
        - Maintenance
      summary: Run nightly sync pipeline (cron style)
      description: |
        Runs the ingest pipeline (KTC → leagues → research → NFL weekly stats ingestion).
        Requires `Authorization: Bearer <CRON_SECRET>` in production.

        **NFL weekly stats ingestion** (`ingest_nfl_week_stats`): fetches raw per-player
        stat lines from `GET https://api.sleeper.app/v1/stats/nfl/regular/{season}/{week}`
        for weeks 1–18 and upserts them into the league-agnostic `nfl_player_week_stats`
        table. The scoring engine then computes `Σ scoring_settings[k] × stats[k]` for any
        league's `scoring_settings`, reproducing Sleeper's matchup `players_points` exactly.
        This step runs once per season after research ingestion.
      operationId: runNightlySyncGet
      responses:
        "200":
          description: Nightly sync completed
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Maintenance
      summary: Run nightly sync pipeline (manual POST)
      description: |
        Same pipeline as GET /api/maintenance/nightly-sync with optional JSON body controls
        (league_ids, seasons, research_week, skip_ktc, skip_leagues, skip_research, skip_prewarm).
        Includes NFL weekly stats ingestion (see GET description).
      operationId: runNightlySyncPost
      responses:
        "200":
          description: Nightly sync completed
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/maintenance/prewarm:
    get:
      tags:
        - Maintenance
      summary: Prewarm dashboard caches
      description: Prewarms known dashboard league cache keys; requires cron authorization.
      operationId: prewarmDashboardCaches
      responses:
        "200":
          description: Prewarm completed successfully
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: One or more prewarm requests failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Sleeper Research
      summary: Refresh research data
      description: Manually refresh research data from Sleeper API for a specific season
      operationId: refreshResearchData
      parameters:
        - $ref: "#/components/parameters/Season"
        - $ref: "#/components/parameters/WeekQuery"
        - $ref: "#/components/parameters/LeagueType"
      responses:
        "200":
          description: Research data refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchRefreshResponse"
        "400":
          description: Invalid parameters or failed to refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Sleeper Research
      summary: Update research data
      description: Manually refresh research data from Sleeper API for a specific season
      operationId: updateResearchData
      parameters:
        - $ref: "#/components/parameters/Season"
        - $ref: "#/components/parameters/WeekQuery"
        - $ref: "#/components/parameters/LeagueType"
      responses:
        "200":
          description: Research data refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchRefreshResponse"
        "400":
          description: Invalid parameters or failed to refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trade-analyzer/providers:
    get:
      tags: [Trade Analyzer]
      summary: List configured LLM providers and their availability
      operationId: listTradeAnalyzerProviders
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeAnalyzerProvidersResponse"

  /api/trade-analyzer/preview:
    post:
      tags: [Trade Analyzer]
      summary: Build slim LLM context and prompts without calling a model
      description: |
        Returns the JSON context embedded in the analyze user prompt, plus system and user
        prompt strings and token estimates. Context uses league-scoped KTC (single tep_level),
        league.research_week with market_owned_pct/market_started_pct, trade.ktc_totals as the
        value anchor, and per-side rosters without duplicate roster_by_position. See
        docs/trade-analyzer-payload.md.
      operationId: previewTradeAnalysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeAnalyzerRequest"
      responses:
        "200":
          description: Preview payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeAnalyzerPreviewResponse"
        "400":
          description: Invalid request body (missing fields, unknown provider, malformed pick_ids, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/trade-analyzer/analyze:
    post:
      tags: [Trade Analyzer]
      summary: Analyze a proposed trade via the configured LLM provider
      description: |
        Use provider echo for a deterministic sample response (tests/fixtures/data/trade_analyzer_echo.json)
        without an external API key. Requires league data in the database.
      operationId: analyzeTrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeAnalyzerRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeAnalyzerResult"
        "400":
          description: Invalid request body (missing fields, unknown provider, malformed pick_ids, bad context, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: League not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: LLM returned malformed response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Provider unavailable or feature disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Provider timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    IsRedraft:
      name: is_redraft
      in: query
      description:
        Ranking type - 'true' for redraft (current season only), 'false'
        for dynasty (long-term player value)
      required: false
      schema:
        type: string
        enum: ["true", "false"]
        default: "false"
      example: "false"

    LeagueFormat:
      name: league_format
      in: query
      description: League format - '1qb' for standard leagues, 'superflex' for
        superflex leagues (can start 2 QBs)
      required: false
      schema:
        type: string
        enum: ["1qb", "superflex"]
        default: "1qb"
      example: "superflex"

    TepLevel:
      name: tep_level
      in: query
      description: |
        TEP (Tight End Premium) scoring level:
        - '' (empty): Standard scoring
        - 'tep': +0.5 points per TE reception
        - 'tepp': +1.0 points per TE reception
        - 'teppp': +1.5 points per TE reception
      required: false
      schema:
        type: string
        enum: ["", "tep", "tepp", "teppp"]
        default: ""
      example: "tep"

    LeagueId:
      name: league_id
      in: path
      description: The Sleeper league ID
      required: true
      schema:
        type: string
        pattern: "^[0-9]+$"
      example: "1210364682523656192"

    Season:
      name: season
      in: path
      description: The NFL season year
      required: true
      schema:
        type: string
        pattern: "^[0-9]{4}$"
      example: "2024"

    SeasonQuery:
      name: season
      in: query
      description: The NFL season year
      required: false
      schema:
        type: string
        pattern: "^[0-9]{4}$"
        default: "2024"
      example: "2024"

    WeekPath:
      name: week
      in: path
      description: Week number (1-18 for regular season)
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 18
      example: 1

    WeekQuery:
      name: week
      in: query
      description: Week number (1-18), or "all" for research refresh/read endpoints
      required: false
      schema:
        oneOf:
          - type: integer
            minimum: 1
            maximum: 18
          - type: string
            enum: ["all"]
        default: 1
      example: 1

    JobId:
      name: job_id
      in: path
      description: Async KTC refresh job identifier
      required: true
      schema:
        type: string

    LeagueType:
      name: league_type
      in: query
      description: League type - "dynasty" or "redraft"
      required: false
      schema:
        type: string
        enum: ["dynasty", "redraft"]
        default: "dynasty"
      example: "dynasty"

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - database
        - timestamp
      properties:
        status:
          type: string
          enum: ["healthy", "unhealthy"]
          description: Overall service health status
        database:
          type: string
          enum: ["connected", "connection_failed", "error"]
          description: Database connection status
        timestamp:
          type: string
          format: date-time
          description: Timestamp of health check
        error:
          type: string
          description: Error details if unhealthy

    ErrorResponse:
      type: object
      description: >
        Standard JSON error envelope. Optional fields depend on the route;
        clients should tolerate unknown keys.
      required:
        - status
        - error
        - timestamp
      additionalProperties: true
      properties:
        status:
          type: string
          enum: ["error"]
        error:
          type: string
          description: Error message
        details:
          type: string
          description: >
            Additional detail as text. When the source value is structured
            (e.g. upstream API error object), the server may JSON-encode it into this string.
        timestamp:
          type: string
          format: date-time
          description: Error timestamp (RFC 3339, UTC with Z)
        hint:
          type: string
          description: Operator hint (e.g. maintenance auth)
        suggestion:
          type: string
          description: Suggested remediation (e.g. which refresh to run)
        job_id:
          type: string
        league_id:
          type: string
        season:
          type: string
        week:
          oneOf:
            - type: integer
            - type: string
          description: Week number or the literal "all" for research refresh errors
        league_type:
          type: string
          enum: ["dynasty", "redraft"]
        parameters:
          type: object
          additionalProperties: true
          description: Request parameters associated with the error (e.g. KTC format flags)
        configuration:
          type: object
          additionalProperties: true
          description: Server-side configuration context (e.g. cleanup target)
        results:
          type: array
          description: Per-item outcomes (e.g. prewarm summary entries)
          items:
            type: object
            additionalProperties: true
        sleeper_players_fetched:
          type: integer
          description: Count from Sleeper merge failures

    Player:
      type: object
      properties:
        id:
          type: integer
          description: Internal player ID
        playerName:
          type: string
          description: Player name
        position:
          type: string
          enum: ["QB", "RB", "WR", "TE", "K", "DEF"]
          description: Player position
        team:
          type: string
          description: Player team abbreviation
        sleeper_player_id:
          type: string
          description: Sleeper API player ID
        birth_date:
          type: string
          format: date
          description: Player birth date
        height:
          type: string
          description: Player height (e.g., "6'2\"")
        weight:
          type: string
          description: Player weight (e.g., "220")
        college:
          type: string
          description: Player college
        years_exp:
          type: integer
          description: Years of NFL experience
        number:
          type: integer
          description: Jersey number
        injury_status:
          type: string
          description: Current injury status
        full_name:
          type: string
          description: Player full name
        status:
          type: string
          description: Player roster status
        ktc:
          $ref: "#/components/schemas/KTCData"
        last_updated:
          type: string
          format: date-time
          description: Last update timestamp

    KTCData:
      type: object
      properties:
        ktc_player_id:
          type: integer
          description: KTC internal player ID
        age:
          type: number
          format: float
          description: Player age
        rookie:
          type: string
          enum: ["Yes", "No"]
          description: Whether player is a rookie
        oneQBValues:
          $ref: "#/components/schemas/PlayerValues"
        superflexValues:
          $ref: "#/components/schemas/PlayerValues"
        slug:
          type: string
          description: KTC player slug
        draftYear:
          type: integer
          description: NFL draft year
        byeWeek:
          type: integer
          description: Team bye week

    PlayerValues:
      type: object
      properties:
        value:
          type: integer
          description: Player trade value
        rank:
          type: integer
          description: Overall rank
        positionalRank:
          type: integer
          description: Position rank
        overallTier:
          type: integer
          description: Overall tier (1-5)
        positionalTier:
          type: integer
          description: Position tier (1-5)
        overallTrend:
          type: integer
          description: Overall trend direction
        positionalTrend:
          type: integer
          description: Position trend direction
        startSitValue:
          type: integer
          description: Start/sit recommendation value
        kept:
          type: integer
          description: Times kept in trades
        traded:
          type: integer
          description: Times traded
        cut:
          type: integer
          description: Times cut/dropped
        tep:
          $ref: "#/components/schemas/TEPValues"
        tepp:
          $ref: "#/components/schemas/TEPValues"
        teppp:
          $ref: "#/components/schemas/TEPValues"

    TEPValues:
      type: object
      properties:
        value:
          type: integer
          description: TEP-adjusted trade value
        rank:
          type: integer
          description: TEP-adjusted overall rank
        positionalRank:
          type: integer
          description: TEP-adjusted position rank
        overallTier:
          type: integer
          description: TEP-adjusted overall tier
        positionalTier:
          type: integer
          description: TEP-adjusted position tier

    KTCRefreshResponse:
      type: object
      properties:
        message:
          type: string
          example: "Rankings refreshed successfully"
        timestamp:
          type: string
          format: date-time
        database_success:
          type: boolean
        file_saved:
          type: boolean
        s3_uploaded:
          type: boolean
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        operations_summary:
          type: object
          properties:
            players_count:
              type: integer
            database_saved_count:
              type: integer
            file_saved:
              type: boolean
            s3_uploaded:
              type: boolean

    KTCRankingsResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        is_redraft:
          type: boolean
        league_format:
          type: string
          enum: ["1qb", "superflex"]
        tep_level:
          type: string
          enum: ["", "tep", "tepp", "teppp"]
        count:
          type: integer
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"

    CleanupResponse:
      type: object
      properties:
        message:
          type: string
          example: "Database cleanup completed"
        timestamp:
          type: string
          format: date-time
        cleanup_result:
          type: object
          properties:
            status:
              type: string
            records_removed:
              type: integer
            configuration:
              type: object

    ComprehensiveRefreshResponse:
      type: object
      properties:
        message:
          type: string
          example: "Comprehensive refresh completed successfully"
        timestamp:
          type: string
          format: date-time
        results:
          type: object
          properties:
            overall_status:
              type: string
              enum: ["success", "partial_success", "error"]
            dynasty:
              type: object
              properties:
                status:
                  type: string
                players_count:
                  type: integer
                db_count:
                  type: integer
            redraft:
              type: object
              properties:
                status:
                  type: string
                players_count:
                  type: integer
                db_count:
                  type: integer
        summary:
          type: object
          properties:
            dynasty_players:
              type: integer
            dynasty_saved:
              type: integer
            redraft_players:
              type: integer
            redraft_saved:
              type: integer
            total_players:
              type: integer
            total_saved:
              type: integer

    SleeperRefreshResponse:
      type: object
      properties:
        message:
          type: string
          example: "Sleeper data refreshed and merged successfully"
        timestamp:
          type: string
          format: date-time
        sleeper_data_results:
          type: object
          properties:
            total_sleeper_players:
              type: integer
            existing_records_before:
              type: integer
            ktc_players_updated:
              type: integer
            new_records_created:
              type: integer
            match_failures:
              type: integer
            total_processed:
              type: integer
        database_success:
          type: boolean
        merge_effective:
          type: boolean

    League:
      type: object
      properties:
        id:
          type: integer
        league_id:
          type: string
          description: Sleeper league ID
        name:
          type: string
          description: League name
        season:
          type: string
          description: Season year
        roster_positions:
          type: array
          items:
            type: string
          description: Required roster positions
        scoring_settings:
          type: object
          description: League scoring settings
        league_settings:
          type: object
          description: League configuration settings
        status:
          type: string
          description: League status
        draft_id:
          type: string
          description: Associated draft ID
        last_updated:
          type: string
          format: date-time

    Roster:
      type: object
      properties:
        id:
          type: integer
        league_id:
          type: string
        roster_id:
          type: integer
          description: Team/roster ID within league
        owner_id:
          type: string
          description: User ID of team owner
        players:
          type: array
          items:
            type: string
          description: Array of player IDs on roster
        starters:
          type: array
          items:
            type: string
          description: Array of starting player IDs
        reserve:
          type: array
          items:
            type: string
          description: Array of reserve player IDs
        taxi:
          type: array
          items:
            type: string
          description: Array of taxi squad player IDs
        settings:
          type: object
          description: Roster-specific settings
        last_updated:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
        league_id:
          type: string
        user_id:
          type: string
          description: Sleeper user ID
        username:
          type: string
          description: Sleeper username
        display_name:
          type: string
          description: Display name
        avatar:
          type: string
          description: Avatar URL/ID
        team_name:
          type: string
          description: Fantasy team name
        user_metadata:
          type: object
          description: Additional user data
        last_updated:
          type: string
          format: date-time

    LeagueDataResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success"]
        data:
          type: object
          properties:
            league:
              $ref: "#/components/schemas/League"
            rosters:
              type: array
              items:
                $ref: "#/components/schemas/Roster"
            users:
              type: array
              items:
                $ref: "#/components/schemas/User"
        source:
          type: string
          enum: ["database", "sleeper_api"]
        database_saved:
          type: boolean
        timestamp:
          type: string
          format: date-time

    RostersResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success"]
        league_id:
          type: string
        rosters:
          type: array
          items:
            $ref: "#/components/schemas/Roster"
        count:
          type: integer
        last_updated:
          type: string
          format: date-time
        timestamp:
          type: string
          format: date-time

    UsersResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success"]
        league_id:
          type: string
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        count:
          type: integer
        last_updated:
          type: string
          format: date-time
        timestamp:
          type: string
          format: date-time

    LeagueRefreshResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success", "partial_success", "error"]
        timestamp:
          type: string
          format: date-time
        league_id:
          type: string
        league_data:
          type: object
          properties:
            status:
              type: string
            save_result:
              type: object
        users_data:
          type: object
          properties:
            status:
              type: string
            message:
              type: string
        rosters_data:
          type: object
          properties:
            status:
              type: string
            message:
              type: string
        errors:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              error:
                type: string

    ResearchData:
      type: object
      properties:
        id:
          type: integer
        season:
          type: string
        week:
          type: integer
        league_type:
          type: string
          enum: ["dynasty", "redraft"]
        player_id:
          type: string
        research_data:
          type: object
          description: Research metrics and analytics data
        last_updated:
          type: string
          format: date-time

    ResearchDataResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success"]
        data:
          type: array
          items:
            $ref: "#/components/schemas/ResearchData"
        source:
          type: string
          enum: ["database", "sleeper_api"]
        database_saved:
          type: boolean
        timestamp:
          type: string
          format: date-time

    ResearchRefreshResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success"]
        message:
          type: string
          example: "Research data refreshed successfully"
        season:
          type: string
        week:
          type: integer
        league_type:
          type: string
          enum: ["dynasty", "redraft"]
        refresh_results:
          type: object
        data:
          oneOf:
            - type: array
              items:
                $ref: "#/components/schemas/ResearchData"
            - type: object
        source:
          type: string
          enum: ["database", "sleeper_api"]
        database_saved:
          type: boolean
        timestamp:
          type: string
          format: date-time

    WeeklyStatsResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success"]
        data_type:
          type: string
          enum: ["weekly", "averages"]
        season:
          type: string
        week:
          type: integer
        weeks_considered:
          type: string
        records:
          type: array
          items:
            type: object
            properties:
              player_id:
                type: string
              roster_id:
                type: integer
              points:
                type: number
              is_starter:
                type: boolean
              last_updated:
                type: string
                format: date-time
        player_averages:
          type: object
        timestamp:
          type: string
          format: date-time

    WeeklyStatsRefreshResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success"]
        message:
          type: string
          example: "Weekly stats refreshed successfully"
        league_id:
          type: string
        season:
          type: string
        week:
          type: integer
        refresh_results:
          type: object
        refreshed_stats:
          type: object
        timestamp:
          type: string
          format: date-time

    LeagueStatsSeedResponse:
      type: object
      properties:
        status:
          type: string
          enum: ["success"]
        message:
          type: string
          example: "League stats seeded successfully"
        action:
          type: string
          enum: ["created", "updated"]
        league_id:
          type: string
        league_name:
          type: string
        season:
          type: string
        timestamp:
          type: string
          format: date-time

    PlayerStatsBlock:
      type: object
      description: |
        Season-aggregate points computed by the scoring engine
        (`Σ scoring_settings[k] × stats[k]`) from `nfl_player_week_stats`, weeks 1–18.
        Reproduces Sleeper's matchup `players_points` exactly for the selected league.
      properties:
        total_points:
          type: number
          format: float
          description: Cumulative season points under the selected league's scoring settings
          example: 154.3
        average_points:
          type: number
          format: float
          description: Points per game (total / games_played)
          example: 9.64
        games_played:
          type: integer
          description: Weeks the player recorded at least one stat line with gp >= 1
          example: 16

    ResearchLatestBlock:
      type: object
      description: Most recent ownership/start percentages from SleeperWeeklyData.research_data
      properties:
        week:
          type: integer
          example: 17
        market_owned_pct:
          type: number
          format: float
          example: 0.92
        market_started_pct:
          type: number
          format: float
          example: 0.71

    ResearchMeta:
      type: object
      description: Metadata describing the ownership data snapshot attached to each player
      properties:
        season:
          type: string
          example: "2025"
        week:
          type: integer
          example: 17
        league_type:
          type: string
          enum: [dynasty, redraft]
          example: dynasty

    PlayersAllResponse:
      type: object
      description: Response envelope for GET /api/players/all
      properties:
        status:
          type: string
          example: success
        timestamp:
          type: string
          format: date-time
        league_format:
          type: string
          enum: [superflex, 1qb]
        is_redraft:
          type: boolean
        tep_level:
          type: string
          enum: ["", tep, tepp, teppp]
        league_id:
          type: string
          nullable: true
          description: Echoed back when provided; null otherwise
        count:
          type: integer
        researchMeta:
          $ref: "#/components/schemas/ResearchMeta"
        players:
          type: array
          description: |
            Every player with a KTC row for the requested format, in the same shape
            as dashboard bundle players. Includes `stats` (engine points) when `season`
            is provided, and `research_latest` (ownership) when research data exists.
          items:
            type: object
            properties:
              sleeper_player_id:
                type: string
              playerName:
                type: string
              position:
                type: string
              team:
                type: string
                nullable: true
              stats:
                $ref: "#/components/schemas/PlayerStatsBlock"
              research_latest:
                $ref: "#/components/schemas/ResearchLatestBlock"
              values:
                type: object
                description: Consensus blend and per-source trade values

    TradeAnalyzerKTC:
      type: object
      properties:
        league_format: { type: string, enum: ["1qb", "superflex"] }
        is_redraft: { type: boolean }
        tep_level: { type: string, enum: ["", "tep", "tepp", "teppp"] }

    TradeAnalyzerSide:
      type: object
      required: [roster_id]
      properties:
        roster_id: { type: integer }
        player_ids: { type: array, items: { type: string } }
        pick_ids:
          {
            type: array,
            items:
              {
                type: string,
                pattern: "^[0-9]{4}-r[0-9]+-(early|mid|late|pick[0-9]+)$",
              },
          }

    TradeAnalyzerRequest:
      type: object
      required: [league_id, season, side_a, side_b]
      properties:
        league_id: { type: string }
        season: { type: string, pattern: "^[0-9]{4}$" }
        ktc: { $ref: "#/components/schemas/TradeAnalyzerKTC" }
        side_a: { $ref: "#/components/schemas/TradeAnalyzerSide" }
        side_b: { $ref: "#/components/schemas/TradeAnalyzerSide" }
        additional_context: { type: string, nullable: true }
        provider:
          type: string
          description: "Registered providers include ollama, anthropic, gemini, echo (dev/test)."
        model: { type: string }

    TradeAnalyzerProvidersResponse:
      type: object
      properties:
        default_provider: { type: string }
        providers:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              default_model: { type: string }
              available: { type: boolean }
              detail: { type: string }
        rate_limit:
          type: object
          properties:
            per_hour: { type: integer }
            key: { type: string }
        enabled: { type: boolean }

    TradeAnalyzerPreviewResponse:
      type: object
      properties:
        context:
          type: object
          description: |
            Slim LLM payload. Top-level keys league, trade, side_a, side_b (no trade_summary;
            no side_*_incoming — incoming is the other side's outgoing). league includes
            starter_slots_required, bench_slots, research_week (not raw roster_positions).
            trade holds side_*_outgoing and ktc_totals. Each side
            has roster (starters/bench/reserve/taxi), owned_picks, team_needs_signals,
            after_trade_snapshot, trade_impact, and always record. Roster players omit name,
            position, and positional_tier (position is the group key). name only on roster
            rows for players in the trade.
            Picks use label + ktc_value only. Trade players include positional_tier, market_*;
            injury from Sleeper (injury) and KTC (ktc.injury).
        system_prompt: { type: string }
        user_prompt: { type: string }
        estimated_tokens: { type: integer }
        token_usage:
          type: object
          properties:
            prompt_tokens_estimated: { type: integer }
            system_chars: { type: integer }
            user_chars: { type: integer }
        provider_used: { type: string }
        model_used: { type: string }

    TradeAnalyzerSideResult:
      type: object
      properties:
        trade_grade:
          type: string
          description: Letter grade A+ through F- for how well this manager did in the deal
        pros: { type: array, items: { type: string } }
        cons: { type: array, items: { type: string } }
        ktc_delta:
          type: object
          properties:
            values_in: { type: integer }
            values_out: { type: integer }
            net: { type: integer }
            per_asset:
              type: array
              items:
                type: object
                properties:
                  name: { type: string }
                  value: { type: integer }
                  direction: { type: string, enum: ["in", "out"] }
        sleeper_breakdown:
          type: object
          properties:
            stats_trajectory: { type: array, items: { type: string } }
            positional_impact: { type: string }
            team_needs_addressed: { type: array, items: { type: string } }

    TradeAnalyzerResult:
      type: object
      properties:
        winner: { type: string, enum: ["side_a", "side_b", "even"] }
        summary_bullets: { type: array, items: { type: string } }
        side_a: { $ref: "#/components/schemas/TradeAnalyzerSideResult" }
        side_b: { $ref: "#/components/schemas/TradeAnalyzerSideResult" }
        context_summary:
          type: object
          properties:
            side_a_team_needs: { type: array, items: { type: string } }
            side_b_team_needs: { type: array, items: { type: string } }
        provider_used: { type: string }
        model_used: { type: string }
        elapsed_ms: { type: integer }

  examples:
    KTCRefreshExample:
      summary: KTC Refresh Request Example
      description: Example of refreshing KTC data for dynasty superflex with TEP
      value:
        is_redraft: "false"
        league_format: "superflex"
        tep_level: "tep"

    PlayerExample:
      summary: Player Data Example
      description: Example of a complete player object with KTC and Sleeper data
      value:
        playerName: "Josh Allen"
        position: "QB"
        team: "BUF"
        sleeper_player_id: "4017"
        birth_date: "1996-05-21"
