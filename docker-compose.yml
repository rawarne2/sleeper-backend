services:
  postgres:
    image: postgres:15-alpine
    container_name: sleeper-postgres
    environment:
      - POSTGRES_DB=sleeper_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local Redis for rankings cache. Comment out this service if you only use a hosted URL.
  # In .env for Compose, use: REDIS_URL=redis://redis:6379/0  (NOT localhost — that is wrong inside the app container)
  # If you remove this service, also delete the sleeper-backend depends_on.redis block below.
  redis:
    image: redis:8-alpine
    container_name: sleeper-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sleeper-backend:
    build: .
    container_name: sleeper-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:5001"
      - "5678:5678" # debugpy - set REMOTE_DEBUG=1 to enable
    volumes:
      # Binds host repo over the image's /app so container runs your working tree (live edits, no rebuild).
      # Remove this line if you want the image alone to define code (stricter prod-like runs).
      - ./:/app
      # Mount local data-files directory for JSON exports
      - ./data-files:/app/data-files
      # Optional: Mount AWS credentials (uncomment if you prefer this approach)
      # - ~/.aws:/root/.aws:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - REMOTE_DEBUG=${REMOTE_DEBUG:-0}
      - ENABLE_DEBUG_TOOLBAR=${ENABLE_DEBUG_TOOLBAR:-0}
      - SECRET_KEY=${SECRET_KEY}
      - IS_DEV=${IS_DEV:-True}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@postgres:5432/sleeper_db?sslmode=disable}
      - CRON_SECRET=${CRON_SECRET}
      - DAILY_REFRESH_SECRET=${DAILY_REFRESH_SECRET}
      - DAILY_REFRESH_RESEARCH_WEEK=${DAILY_REFRESH_RESEARCH_WEEK:-1}
      - REDIS_URL=${REDIS_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/ktc/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
