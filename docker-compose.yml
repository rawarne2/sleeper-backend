services:
  postgres:
    image: postgres:15-alpine
    container_name: sleeper-postgres
    environment:
      - POSTGRES_DB=sleeper_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  sleeper-backend:
    build: .
    container_name: sleeper-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"
      - "5678:5678" # debugpy - set REMOTE_DEBUG=1 to enable
    volumes:
      # Mount local data-files directory for JSON exports
      - ./data-files:/app/data-files
      # Optional: Mount AWS credentials (uncomment if you prefer this approach)
      # - ~/.aws:/root/.aws:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - REMOTE_DEBUG=${REMOTE_DEBUG:-0}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@postgres:5432/sleeper_db?sslmode=disable}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/ktc/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
